name: remote-bridge
displayName: RemoteBridge
description: Bridge the gap between AI-generated code and remote servers. Sync files via rsync, run commands over SSH, tail logs, and deploy — all from your AI IDE.
homepage: https://github.com/varaprasadreddy9676/remote-bridge
license: MIT
category: DevOps

runtime: stdio
command: remote-bridge
args:
  - mcp

tools:
  - name: sync_to_remote
    description: Syncs a local directory to the remote server via rsync over SSH. Supports local_path, dry_run, delete (opt-in, off by default), and confirm (required when target has require_confirmation=true).
  - name: run_remote_command
    description: Executes a shell command on the remote server and returns stdout/stderr. Combined output is truncated to max_lines (default 100).
  - name: preflight_check
    description: Checks the remote environment for OS version and available runtimes (Node, Python, Rust, Docker)
  - name: fetch_logs
    description: Fetches recent lines from the configured remote log files
  - name: restart_service
    description: Restarts the remote service using restart_cmd defined in remotebridge.yaml
  - name: deploy
    description: Full deploy pipeline — sync files, restart service, tail logs on failure
  - name: diagnose_failure
    description: Collects a compact, config-aware diagnosis bundle for a target and summarizes likely causes
  - name: compare_targets
    description: Compares two configured targets for config drift, runtime drift, and compatibility risks

installation:
  npm:
    package: remote-bridge-cli
    command: npm install -g remote-bridge-cli
  source:
    url: https://github.com/varaprasadreddy9676/remote-bridge
    command: cargo build --release

configuration:
  file: remotebridge.yaml
  example: |
    project_name: "my-app"
    targets:
      staging:
        host: "your-server.com"
        user: "ubuntu"
        remote_path: "/var/www/app"
        port: 22
        ssh_key: "~/.ssh/id_rsa"
        restart_cmd: "pm2 restart app"
        logs:
          - "/var/www/app/logs/error.log"
      production:
        host: "prod.example.com"
        user: "ubuntu"
        remote_path: "/var/www/app"
        ssh_key: "~/.ssh/id_rsa"
        restart_cmd: "pm2 restart app"
        require_confirmation: true
        logs:
          - "/var/www/app/logs/error.log"
